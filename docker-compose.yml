services:
  # Database service
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./docker.env
    expose:
      - "5432"
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis service for Django Channels
  redis:
    image: redis:alpine
    expose:
      - "6379"
    networks:
      - cache_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django backend service
  backend:
    build: 
      context: .
      dockerfile: ./docker/backend/Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - APP_VERSION=${APP_VERSION:-unknown}
    image: edusphere-backend
    volumes:
      - media_data:/app/media
      - static_volume:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.settings
    env_file:
      - ./docker.env
    expose:
      - "8000"
    networks:
      - app_network
      - db_network
      - cache_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/infra/ready/"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  
  # Database migration service
  migrate:
    image: edusphere-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput"
    env_file:
      - ./docker.env
    networks:
      - db_network
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - static_volume:/app/staticfiles

  # Celery Worker
  celery_worker:
    image: edusphere-backend
    command: celery -A backend.config worker -l info
    volumes:
      - media_data:/app/media
    env_file:
      - ./docker.env
    networks:
      - app_network
      - db_network
      - cache_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure:5

  # Celery Beat
  celery_beat:
    image: edusphere-backend
    command: celery -A backend.config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - media_data:/app/media
    env_file:
      - ./docker.env
    networks:
      - db_network
      - app_network
      - cache_network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure:5

  # Nginx service with built-in frontend
  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_data:/app/media:ro
    env_file:
      - ./docker.env
    ports:
      - "80:80"
    networks:
      - app_network
      - monitor_network
    depends_on:
      backend:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
    restart: unless-stopped

  # Node Exporter - host metrics for Prometheus
  node-exporter:
    image: prom/node-exporter:latest
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--no-collector.filesystem'
      - '--no-collector.softnet'
      - '--no-collector.netstat'
    expose:
      - "9100"
    networks:
      - monitor_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus service
  prometheus:
    image: prom/prometheus:v2.51.2
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=http://localhost/prometheus/'
      - '--web.route-prefix=/prometheus'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - app_network
      - monitor_network
    depends_on:
      backend:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/prometheus/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana service
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      # Authentication
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USER_ALLOW_SIGN_UP=false
      # Server configuration for subpath
      - GF_SERVER_DOMAIN=localhost
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    env_file:
      - ./docker.env
    expose:
      - "3000"
    networks:
      - monitor_network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider --tries=1 http://localhost:3000/grafana/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
  db_network:
  cache_network:
  monitor_network:

volumes:
  postgres_data:
  static_volume:
  media_data:
  prometheus_data:
  grafana_data:
