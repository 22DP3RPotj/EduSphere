global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'edusphere-backend'
    metrics_path: '/infra/metrics/'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'node-exporter'
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
