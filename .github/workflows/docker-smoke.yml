name: Docker Smoke

on:
  push:
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env file
        run: cp .env.example docker.env

      - name: Show Docker versions
        run: |
          docker --version
          docker compose --env-file docker.env version

      - name: Build images
        run: docker compose --env-file docker.env build --pull

      - name: Start stack (wait for readiness)
        run: |
          set -euo pipefail
          docker compose --env-file docker.env up -d --wait --wait-timeout 120

      - name: Assert backend is healthy
        run: |
          set -euo pipefail

          backend_id=$(docker compose --env-file docker.env ps -q backend)
          
          if [ -z "$backend_id" ]; then
            echo "Error: Backend container not found."
            docker compose --env-file docker.env ps
            exit 1
          fi

          state=$(docker inspect --format '{{.State.Status}}' "$backend_id")
          if [ "$state" == "exited" ]; then
            echo "Backend container crashed!"
            docker compose --env-file docker.env logs --no-color backend
            exit 1
          fi

          status=$(docker inspect --format '{{.State.Health.Status}}' "$backend_id" 2>/dev/null || echo "none")
          echo "Backend health: $status"
          
          if [ "$status" != "healthy" ] && [ "$status" != "none" ]; then
            # 'none' is acceptable if you haven't defined a HEALTHCHECK in your Dockerfile
            docker inspect --format '{{json .State.Health}}' "$backend_id" || true
            docker compose --env-file docker.env logs --no-color --tail=300 backend
            exit 1
          fi

      - name: HTTP smoke via nginx
        run: |
          set -euo pipefail

          root_code="$(curl -sS --retry 10 --retry-connrefused --retry-delay 2 -o /dev/null -w '%{http_code}' http://localhost/)"
          echo "GET / -> $root_code"
          if [ "$root_code" -ge 500 ] || [ "$root_code" = "000" ]; then
            echo "Unexpected root status: $root_code"
            docker compose --env-file docker.env logs --no-color --tail=300 nginx
            docker compose --env-file docker.env logs --no-color --tail=300 backend
            exit 1
          fi

          graphql_code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost/graphql/ || true)"
          echo "GET /graphql/ -> ${graphql_code:-unknown}"
          if [ -n "$graphql_code" ] && [ "$graphql_code" != "000" ] && [ "$graphql_code" -ge 500 ]; then
            echo "Unexpected graphql status: $graphql_code"
            docker compose --env-file docker.env logs --no-color --tail=300 nginx
            docker compose --env-file docker.env logs --no-color --tail=300 backend
            exit 1
          fi

      - name: Show logs
        if: always()
        run: |
          docker compose --env-file docker.env ps
          docker compose --env-file docker.env logs --no-color --tail=200

      - name: Teardown
        if: always()
        run: docker compose --env-file docker.env down -v
