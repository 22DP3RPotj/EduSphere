services:
  # Database service
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./docker.env
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis service for Django Channels
  redis:
    image: redis:alpine
    expose:
      - "6379"

  # Django backend service
  backend:
    build: 
      context: .
      dockerfile: ./docker/backend/Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - APP_VERSION=${APP_VERSION:-unknown}
    volumes:
      - ./media:/app/media
      - static_volume:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.settings
    env_file:
      - ./docker.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/infra/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Celery Worker
  celery_worker:
    image: edusphere-backend
    command: celery -A backend.config worker -l info
    volumes:
      - ./media:/app/media
    env_file:
      - ./docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    restart: on-failure:5

  # Celery Beat
  celery_beat:
    image: edusphere-backend
    command: celery -A backend.config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./media:/app/media
    env_file:
      - ./docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    restart: on-failure:5

  # Nginx service with built-in frontend
  nginx:
    build:
      context: .  # Changed from ./docker/nginx to . for access to frontend/
      dockerfile: ./docker/nginx/Dockerfile
    volumes:
      - static_volume:/app/staticfiles:ro
      - ./media:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # Prometheus service
  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # Grafana service
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  static_volume:
  prometheus_data:
  grafana_data:
