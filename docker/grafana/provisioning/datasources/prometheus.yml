# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/grafana/refs/heads/main/conf/provisioning/datasources/sample.yaml

apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus/
